excluded:
  - Neco/Sprites.swift # generated
  - build # xcodebuild output

disabled_rules:
  - line_length
  - nesting

# Require trailing commas to match SwiftFormat's trailingCommas rule.
trailing_comma:
  mandatory_comma: true

# Pixel/geometry code uses short names like x, y, dx, dy.
identifier_name:
  min_length:
    warning: 1
    error: 1

analyzer_rules:
  - unused_declaration
  - unused_import
